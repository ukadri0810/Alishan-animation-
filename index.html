<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alishan - Premium Custom Loader</title>
  <style>
    /* Premium Serif Typography */
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #080808; /* Deeper, richer black */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Cinzel', serif;
    }

    /* Cinematic Ambient Backlight */
    .ambient-glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, rgba(8, 8, 8, 0) 70%);
      border-radius: 50%;
      z-index: 0;
      animation: pulseGlow 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    .loader-stage {
      position: relative;
      width: 300px;
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      z-index: 1;
    }

    /* Custom Angular Cloche */
    .cloche-container {
      position: absolute;
      bottom: 50px; /* Sits exactly on the plate */
      width: 120px;
      height: 90px;
      display: flex;
      justify-content: center;
      transform-origin: bottom center;
      /* Custom easing: slow anticipation, fast lift, gentle settle */
      animation: bespokeLift 4s infinite cubic-bezier(0.77, 0, 0.175, 1);
      z-index: 3;
    }

    .cloche-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5));
    }

    .lux-stroke {
      fill: none;
      stroke: #E6CBA8; /* Champagne gold - more elegant than yellow gold */
      stroke-width: 1.5;
      stroke-miterlimit: 10;
    }

    .lux-fill {
      fill: #E6CBA8;
    }

    /* The Plate / Horizon Line */
    .plate-line {
      position: absolute;
      bottom: 48px;
      width: 160px;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, #E6CBA8 50%, transparent 100%);
      z-index: 4;
      opacity: 0.8;
    }

    /* The Masking Container for Typography */
    .text-mask-container {
      position: absolute;
      bottom: 50px;
      width: 200px;
      height: 60px; /* Limits the visibility height */
      overflow: hidden; /* This is the secret to the cinematic reveal */
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 2;
    }

    /* Typography & Light Sweep */
    .brand-text {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding-bottom: 5px;
      
      /* The text starts pushed down below the mask boundary */
      transform: translateY(100%);
      animation: textRise 4s infinite cubic-bezier(0.77, 0, 0.175, 1);

      /* Metallic Shimmer Effect */
      background: linear-gradient(
        120deg, 
        #a67c00 0%, 
        #bf953f 25%, 
        #fcf6ba 50%, 
        #b38728 75%, 
        #fdffcc 100%
      );
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }

    .shimmer-active {
      animation: 
        textRise 4s infinite cubic-bezier(0.77, 0, 0.175, 1),
        shimmerSweep 4s infinite linear;
    }

    /* --- Choreographed Keyframes --- */

    @keyframes bespokeLift {
      0%, 15% {
        transform: translateY(0);
      }
      35%, 75% {
        transform: translateY(-70px); /* Lifts high enough to clear the text */
        opacity: 0; /* Fades out smoothly while rising */
      }
      85%, 100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes textRise {
      0%, 20% {
        transform: translateY(100%);
        letter-spacing: 0.1em;
        opacity: 0;
      }
      35%, 75% {
        transform: translateY(0);
        letter-spacing: 0.35em; /* Expands slightly as it settles */
        opacity: 1;
      }
      85%, 100% {
        transform: translateY(100%);
        letter-spacing: 0.1em;
        opacity: 0;
      }
    }

    @keyframes shimmerSweep {
      0%, 35% {
        background-position: 200% center;
      }
      50%, 75% {
        background-position: -200% center;
      }
      100% {
        background-position: -200% center;
      }
    }

    @keyframes pulseGlow {
      0%, 15% { opacity: 0.3; transform: scale(0.9); }
      35%, 75% { opacity: 1; transform: scale(1.1); }
      85%, 100% { opacity: 0.3; transform: scale(0.9); }
    }
  </style>
</head>
<body>

  <div class="ambient-glow"></div>

  <div class="loader-stage">
    
    <!-- The Custom Cloche -->
    <div class="cloche-container">
      <svg viewBox="0 0 100 80" class="cloche-svg">
        <!-- Sleek, architectural cloche path -->
        <path class="lux-stroke" d="M 10,75 C 10,40 30,20 50,20 C 70,20 90,40 90,75" />
        <!-- Sharp top handle -->
        <path class="lux-fill" d="M 48,20 L 48,10 L 52,10 L 52,20 Z" />
        <rect class="lux-fill" x="45" y="8" width="10" height="2" />
      </svg>
    </div>

    <!-- The Masking Container -->
    <div class="text-mask-container">
      <!-- Added both animations via class -->
      <div class="brand-text shimmer-active">Alishan</div>
    </div>

    <!-- The Base Plate Line -->
    <div class="plate-line"></div>

  </div>

</body>
</html>
