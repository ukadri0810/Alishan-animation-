<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alishan - Premium Loader</title>
  <style>
    /* Google Fonts for a Premium Serif */
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap');

    /* Reset & Base Setup */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0c; /* Obsidian/Charcoal dark */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Container */
    .loader-container {
      position: relative;
      width: 250px;
      height: 250px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* SVG Styling */
    .cloche-svg {
      width: 100%;
      height: 100%;
      position: absolute;
      z-index: 2;
    }

    .gold-stroke {
      fill: none;
      stroke: #d4af37; /* Premium metallic gold */
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .gold-fill {
      fill: #d4af37;
    }

    /* Animation Elements */
    .cloche-dome {
      transform-origin: center;
      /* Cubic-bezier adds a realistic "heavy" lift and smooth settle */
      animation: liftDome 4s infinite cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .steam {
      fill: none;
      stroke: #d4af37;
      stroke-width: 1.5;
      stroke-linecap: round;
      opacity: 0;
      filter: blur(1px);
    }

    .steam-1 {
      animation: riseSteam 4s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94);
      animation-delay: 0.6s; /* Starts right as cloche lifts */
    }

    .steam-2 {
      animation: riseSteam 4s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94);
      animation-delay: 0.8s;
    }

    /* Brand Typography */
    .brand-text {
      position: absolute;
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 500;
      color: #d4af37;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      z-index: 1;
      opacity: 0;
      /* Positioning slightly up to sit perfectly above the plate */
      transform: translateY(10px);
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
      animation: revealText 4s infinite cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    /* --- Keyframes --- */

    /* The Cloche lifts up and fades out to reveal the interior */
    @keyframes liftDome {
      0%, 15% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      30% {
        transform: translateY(-40px) scale(0.95);
        opacity: 0;
      }
      80% {
        transform: translateY(-40px) scale(0.95);
        opacity: 0;
      }
      100% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    /* The steam rises elegantly and fades away */
    @keyframes riseSteam {
      0% {
        transform: translateY(10px) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 0.7;
      }
      50% {
        transform: translateY(-30px) scale(1.1);
        opacity: 0;
      }
      100% {
        transform: translateY(-30px) scale(1.1);
        opacity: 0;
      }
    }

    /* The text takes the place of the steam, glowing into existence */
    @keyframes revealText {
      0%, 25% {
        opacity: 0;
        transform: translateY(15px);
        filter: blur(4px);
      }
      45%, 70% {
        opacity: 1;
        transform: translateY(5px);
        filter: blur(0px);
      }
      85%, 100% {
        opacity: 0;
        transform: translateY(5px);
        filter: blur(4px);
      }
    }
  </style>
</head>
<body>

  <div class="loader-container">
    <svg viewBox="0 0 120 120" class="cloche-svg">
      <path class="steam steam-1" d="M 45,75 Q 35,45 50,15" />
      <path class="steam steam-2" d="M 75,75 Q 85,45 70,15" />
      
      <g class="cloche-dome">
        <path class="gold-stroke" d="M 20,80 C 20,20 100,20 100,80" />
        <circle class="gold-fill" cx="60" cy="22" r="4" />
      </g>
      
      <ellipse class="gold-stroke" cx="60" cy="82" rx="45" ry="3" />
    </svg>

    <div class="brand-text">Alishan</div>
  </div>

</body>
</html>
