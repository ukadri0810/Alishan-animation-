<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alishan - Fine Dining Loader</title>
  <style>
    /* Primary Serif for Brand Name */
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap');
    /* Clean Sans-Serif for Subtext */
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #050505; /* Pitch black for maximum contrast */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Container for the entire plating sequence */
    .table-setting {
      position: relative;
      width: 400px;
      height: 400px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* SVG Styling */
    .plating-svg {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .lux-line {
      fill: none;
      stroke: #E6CBA8; /* Champagne Gold */
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .lux-line-thin {
      fill: none;
      stroke: #E6CBA8;
      stroke-width: 0.75;
      opacity: 0.4;
    }

    /* SVG Animation Classes */
    .plate-outer {
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: drawCircle 2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
    }

    .plate-inner {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawCircle 2s cubic-bezier(0.65, 0, 0.35, 1) 0.3s forwards;
    }

    .cutlery-fork {
      opacity: 0;
      transform: translateX(-30px);
      animation: slideInCutlery 1.5s cubic-bezier(0.25, 1, 0.5, 1) 1s forwards;
    }

    .cutlery-knife {
      opacity: 0;
      transform: translateX(30px);
      animation: slideInCutlery 1.5s cubic-bezier(0.25, 1, 0.5, 1) 1.2s forwards;
    }

    .steam-path {
      opacity: 0;
      filter: blur(2px);
    }
    
    .steam-1 { animation: riseAroma 4s infinite cubic-bezier(0.4, 0, 0.2, 1) 1.5s; }
    .steam-2 { animation: riseAroma 4s infinite cubic-bezier(0.4, 0, 0.2, 1) 2s; }

    /* Typography Overlays */
    .brand-container {
      position: absolute;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      
      /* Hidden initially */
      opacity: 0;
      transform: scale(0.95);
      animation: revealBrand 2s cubic-bezier(0.25, 1, 0.5, 1) 2s forwards;
    }

    .brand-name {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      font-weight: 500;
      color: #E6CBA8;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-shadow: 0px 4px 15px rgba(230, 203, 168, 0.3);
      margin-bottom: 5px;
      margin-left: 0.2em; /* Optical centering for letter-spacing */
    }

    .brand-subtext {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      color: rgba(230, 203, 168, 0.7);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-left: 0.4em; /* Optical centering */
    }

    /* Ambient glow behind the plate */
    .plate-glow {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(230,203,168,0.05) 0%, rgba(5,5,5,0) 70%);
      z-index: 0;
      opacity: 0;
      animation: pulseGlow 4s infinite alternate 2s;
    }

    /* --- Keyframes --- */

    @keyframes drawCircle {
      to { stroke-dashoffset: 0; }
    }

    @keyframes slideInCutlery {
      to { 
        opacity: 1; 
        transform: translateX(0); 
      }
    }

    @keyframes revealBrand {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes riseAroma {
      0% { transform: translateY(10px) scale(0.9); opacity: 0; }
      30% { opacity: 0.5; }
      70% { transform: translateY(-20px) scale(1.1); opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes pulseGlow {
      from { opacity: 0.5; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1.1); }
    }

  </style>
</head>
<body>

  <div class="table-setting">
    
    <div class="plate-glow"></div>

    <svg viewBox="0 0 400 400" class="plating-svg">
      
      <circle class="lux-line plate-outer" cx="200" cy="200" r="110" />
      <circle class="lux-line-thin plate-inner" cx="200" cy="200" r="85" />

      <path class="lux-line-thin steam-path steam-1" d="M 180,220 Q 170,190 190,160 T 180,120" />
      <path class="lux-line-thin steam-path steam-2" d="M 220,220 Q 230,190 210,160 T 220,120" />

      <g class="cutlery-fork">
        <path class="lux-line" d="M 50,110 L 50,160 C 50,180 65,190 65,210 L 65,290" />
        <path class="lux-line" d="M 60,110 L 60,160" />
        <path class="lux-line" d="M 70,110 L 70,160" />
        <path class="lux-line" d="M 80,110 L 80,160 C 80,180 65,190 65,210" />
      </g>

      <g class="cutlery-knife">
        <path class="lux-line" d="M 335,110 Q 350,125 350,170 L 350,290 L 335,290 Z" />
        <line class="lux-line" x1="335" y1="190" x2="350" y2="190" />
      </g>

    </svg>

    <div class="brand-container">
      <div class="brand-name">Alishan</div>
      <div class="brand-subtext">Fine Dining</div>
    </div>

  </div>

</body>
</html>
